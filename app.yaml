apiVersion: v1
kind: ConfigMap
metadata:
  name: wil42-playground-content
---
apiVersion: v1
kind: Service
metadata:
  name: wil42-playground-service
spec:
  selector:
    app: wil42-playground
  ports:
    - port: 8888
      targetPort: 8888
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil42-playground
spec:
  selector:
    matchLabels:
      app: wil42-playground
  template:
    metadata:
      labels:
        app: wil42-playground
    spec:
      containers:
      - name: wil42
        image: wil42/playground:v1
        ports:
        - containerPort: 8888
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wil42-ingress
  namespace: dev
spec:
  rules:
  - host: localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wil42-playground
            port:
              number: 8888
